site_name: LEVER Capability Framework
site_description: A capability multiplication framework synthesizing classical learning models for the AI era
site_url: https://productbuildershq.com/lever
repo_url: https://github.com/ProductBuildersHQ/lever
repo_name: ProductBuildersHQ/lever

copyright: Copyright &copy; 2024-2026 ProductBuildersHQ

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - tags

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ProductBuildersHQ
    - icon: fontawesome/solid/globe
      link: https://productbuildershq.com

nav:
  - Home: index.md
  - The Five Stages:
      - Overview: stages/index.md
      - Learn: stages/learn.md
      - Execute: stages/execute.md
      - Value: stages/value.md
      - Enable: stages/enable.md
      - Replicate: stages/replicate.md
  - Framework Mappings:
      - Overview: frameworks/index.md
      - Bloom's Taxonomy: frameworks/bloom.md
      - Dreyfus Model: frameworks/dreyfus.md
      - Shu-Ha-Ri: frameworks/shu-ha-ri.md
      - Apprenticeship: frameworks/apprenticeship.md
      - Mapping Table: frameworks/mappings.md
  - Domain Profiles:
      - Overview: profiles/index.md
      - Product Builder: profiles/product-builder.md
      - Software Engineer: profiles/engineer.md
  - Usage:
      - Go Library: usage/go.md
      - TypeScript/Zod: usage/typescript.md
      - CLI: usage/cli.md
  - Reference:
      - JSON Schema: reference/schema.md
      - Ecosystem: reference/ecosystem.md
