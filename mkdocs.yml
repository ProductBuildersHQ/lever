site_name: LEVER Capability Framework
site_description: A capability multiplication framework synthesizing classical learning models for the AI era
site_url: https://productbuildershq.com/lever
repo_url: https://github.com/ProductBuildersHQ/lever
repo_name: ProductBuildersHQ/lever

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # Light mode first (ProductBuildersHQ default)
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

# ProductBuildersHQ Theme Assets (served from main site)
extra_css:
  - https://productbuildershq.com/css/productbuildershq-mkdocs.css

extra_javascript:
  - https://productbuildershq.com/js/site-nav.min.js
  - https://productbuildershq.com/js/pbhq-nav.js

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - The Five Stages:
      - Overview: stages/index.md
      - Learn: stages/learn.md
      - Execute: stages/execute.md
      - Value: stages/value.md
      - Enable: stages/enable.md
      - Replicate: stages/replicate.md
  - Framework Mappings:
      - Overview: frameworks/index.md
      - Bloom's Taxonomy: frameworks/bloom.md
      - Dreyfus Model: frameworks/dreyfus.md
      - Shu-Ha-Ri: frameworks/shu-ha-ri.md
      - Apprenticeship: frameworks/apprenticeship.md
      - Mapping Table: frameworks/mappings.md
  - Domain Profiles:
      - Overview: profiles/index.md
      - Product Builder: profiles/product-builder.md
      - Software Engineer: profiles/engineer.md
  - Usage:
      - Go Library: usage/go.md
      - TypeScript/Zod: usage/typescript.md
      - CLI: usage/cli.md
  - Reference:
      - JSON Schema: reference/schema.md
      - Ecosystem: reference/ecosystem.md
  - Releases:
      - v0.1.0: releases/v0.1.0.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ProductBuildersHQ/lever
